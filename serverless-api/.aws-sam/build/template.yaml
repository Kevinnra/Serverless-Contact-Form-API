AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Contact Form API - Serverless infrastructure
Globals:
  Function:
    Timeout: 10
    MemorySize: 128
    Runtime: python3.13
    Environment:
      Variables:
        TABLE_NAME:
          Ref: ContactFormTable
        SENDER_EMAIL:
          Ref: SenderEmail
        RECIPIENT_EMAIL:
          Ref: RecipientEmail
Parameters:
  SenderEmail:
    Type: String
    Description: Verified SES sender email address
    Default: verified-email@example.com
  RecipientEmail:
    Type: String
    Description: Email address to receive notifications
    Default: email@example.com
  Environment:
    Type: String
    Description: Environment name (dev, staging, prod)
    Default: prod
    AllowedValues:
    - dev
    - staging
    - prod
Resources:
  ContactFormFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName:
        Fn::Sub: ContactFormHandler-${Environment}
      Description: Processes contact form submissions
      CodeUri: ContactFormFunction
      Handler: lambda_function.lambda_handler
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: ContactFormTable
      - SESCrudPolicy:
          IdentityName:
            Ref: SenderEmail
      - Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Action:
          - logs:CreateLogGroup
          - logs:CreateLogStream
          - logs:PutLogEvents
          Resource: '*'
      Events:
        ContactAPI:
          Type: Api
          Properties:
            Path: /contact
            Method: post
            RestApiId:
              Ref: ContactFormAPI
    Metadata:
      SamResourceId: ContactFormFunction
  ContactFormAPI:
    Type: AWS::Serverless::Api
    Properties:
      Name:
        Fn::Sub: ContactFormAPI-${Environment}
      StageName:
        Ref: Environment
      Cors:
        AllowMethods: '''POST, OPTIONS'''
        AllowHeaders: '''Content-Type,X-Amz-Date,Authorization,X-Api-Key'''
        AllowOrigin: '''*'''
      AccessLogSetting:
        DestinationArn:
          Fn::GetAtt:
          - ApiGatewayLogGroup
          - Arn
        Format: $context.requestId $context.error.message $context.error.messageString
  ContactFormTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName:
        Fn::Sub: ContactFormSubmissions-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: email
        AttributeType: S
      - AttributeName: timestamp
        AttributeType: N
      KeySchema:
      - AttributeName: email
        KeyType: HASH
      - AttributeName: timestamp
        KeyType: RANGE
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
      Tags:
      - Key: Environment
        Value:
          Ref: Environment
      - Key: Project
        Value: ContactFormAPI
  LambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName:
        Fn::Sub: /aws/lambda/ContactFormHandler-${Environment}
      RetentionInDays: 14
  ApiGatewayLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName:
        Fn::Sub: /aws/apigateway/ContactFormAPI-${Environment}
      RetentionInDays: 14
  AlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName:
        Fn::Sub: ContactFormAlerts-${Environment}
      DisplayName: Contact Form Alerts
      Subscription:
      - Endpoint:
          Ref: RecipientEmail
        Protocol: email
  LambdaErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName:
        Fn::Sub: ContactForm-Lambda-Errors-${Environment}
      AlarmDescription: Alert when Lambda function has errors
      MetricName: Errors
      Namespace: AWS/Lambda
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 2
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
      - Name: FunctionName
        Value:
          Ref: ContactFormFunction
      AlarmActions:
      - Ref: AlertTopic
      TreatMissingData: notBreaching
  API5XXErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName:
        Fn::Sub: ContactForm-API-5XX-Errors-${Environment}
      AlarmDescription: Alert when API returns 5XX errors
      MetricName: 5XXError
      Namespace: AWS/ApiGateway
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 3
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
      - Name: ApiName
        Value:
          Fn::Sub: ContactFormAPI-${Environment}
      AlarmActions:
      - Ref: AlertTopic
      TreatMissingData: notBreaching
  HighLatencyAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName:
        Fn::Sub: ContactForm-High-Latency-${Environment}
      AlarmDescription: Alert when API response time is too high
      MetricName: Latency
      Namespace: AWS/ApiGateway
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 3000
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
      - Name: ApiName
        Value:
          Fn::Sub: ContactFormAPI-${Environment}
      AlarmActions:
      - Ref: AlertTopic
      TreatMissingData: notBreaching
Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value:
      Fn::Sub: https://${ContactFormAPI}.execute-api.${AWS::Region}.amazonaws.com/${Environment}/contact
    Export:
      Name:
        Fn::Sub: ContactFormAPI-Endpoint-${Environment}
  LambdaFunctionArn:
    Description: Lambda function ARN
    Value:
      Fn::GetAtt:
      - ContactFormFunction
      - Arn
    Export:
      Name:
        Fn::Sub: ContactFormFunction-Arn-${Environment}
  DynamoDBTableName:
    Description: DynamoDB table name
    Value:
      Ref: ContactFormTable
    Export:
      Name:
        Fn::Sub: ContactFormTable-Name-${Environment}
  SNSTopicArn:
    Description: SNS topic ARN for alerts
    Value:
      Ref: AlertTopic
    Export:
      Name:
        Fn::Sub: ContactFormAlerts-Arn-${Environment}
